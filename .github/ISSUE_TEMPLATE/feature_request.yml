name: Feature vorschlagen
description: Eine neue Funktion oder Verbesserung vorschlagen
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Vorschlag! Jede Idee hilft, das MachMit!Haus Webprojekt besser zu machen.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Welches Problem soll gelöst werden oder was fehlt aktuell?
      placeholder: Beschreibe, warum dieses Feature hilfreich wäre.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Gewünschte Lösung
      description: Wie stellst du dir die Funktion vor?
      placeholder: Beschreibe, wie es funktionieren könnte.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen
      description: Hast du andere Lösungswege in Betracht gezogen?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      description: Welcher Teil der Seite wäre betroffen?
      options:
        - Startseite
        - Projekte
        - Räume / Buchung
        - Newsletter
        - Veranstaltungen
        - Team
        - Blog / Notizen
        - Panel (Verwaltung)
        - Design / Layout
        - Performance
        - APP Integration
        - API / Backend
        - sonstiges
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Wichtigkeit
      description: Wie wichtig ist dieses Feature für dich?
      options:
        - Nice to have
        - Würde den Alltag erleichtern
        - Wird dringend benötigt
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Skizzen / Screenshots
      description: Falls vorhanden, füge Mockups, Skizzen oder Referenzbeispiele hinzu.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Zusätzlicher Kontext
      description: Gibt es weitere Informationen zu diesem Vorschlag?
    validations:
      required: false
