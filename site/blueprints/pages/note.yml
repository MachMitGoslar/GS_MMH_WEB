title: Tagebucheintrag
icon: book

# Page options
options:
  url: true
  status: true
  template: note

# Page status settings
status:
  draft: true
  listed: true

# Create settings for automatic field population
create:
  title:
    label: Titel
  slug: '{{ (page.date ?? "now") | date("Ymd") }}_{{ page.title.slug }}'
  template: note

tabs:
  content:
    label: Inhalt
    icon: text
    # Two column layout for better organization
    columns:
      - width: 2/3
        sections:
          # Main content fields
          content:
            type: fields
            fields:
              # Cover image field
              cover:
                extends: fields/cover
                label: Titelbild
                help: Optionales Bild für den Tagebucheintrag
                
              # Main title field
              title:
                label: Titel
                type: text
                placeholder: z.B. "Erfolgreicher Workshop-Tag"
                required: true
                width: 1/1
              
              # Optional headline/subtitle
              headline:
                label: Untertitel
                type: text
                placeholder: Optionaler Untertitel für den Eintrag
                width: 1/1
                
              
              # Main text content using blocks
              text:
                label: Inhalt
                type: blocks
                required: true
                fieldsets:
                  heading:
                    extends: blocks/heading
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  text:
                    extends: blocks/text
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  image:
                    extends: blocks/image
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  gallery:
                    extends: blocks/gallery
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  video:
                    extends: blocks/video
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  quote:
                    extends: blocks/quote
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  list:
                    extends: blocks/list
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  line:
                    extends: blocks/line
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                  button:
                    extends: blocks/button
                    fields:
                      publish_date:
                        extends: fields/blockPublishDate
                      end_date:
                        extends: fields/blockEndDate
                help: Der Hauptinhalt des Tagebucheintrags
                
      - width: 1/3
        sections:
          # Metadata and settings
          meta:
            type: fields
            fields:
              
              # Author selection (team members)
              author:
                label: Autor(en) & Beteiligte
                type: pages
                query: site.find("team").children.listed()
                template: member
                multiple: true
                help: Wer hat diesen Eintrag geschrieben?
                layout: cards
                size: tiny
                image: 
                  query: page.cover
                  cover: true
                  ratio: 1/1
                info: "{{ page.name }}"
                
              # Tags for categorization
              tags:
                label: Schlagworte
                type: tags
                help: Tags zur Kategorisierung (z.B. "verwaltung", "digitalisierung", "beteiligung")
                placeholder: Neue Tags hinzufügen...
                accept: all
                separator: ","
                
      
            
# Additional tabs for file management

    
  files:
    label: Dateien
    sections:
      files:
        type: files
        template: image
        layout: cards
        size: tiny
        image:
          cover: true
          ratio: 1/1
        info: "{{ file.dimensions }}"
        help: Bilder und andere Dateien für diesen Eintrag
        
  settings:
    label: Einstellungen
    sections:
      settings_fields:
        type: fields
        fields:
          # SEO and meta fields
          seo_title:
            label: SEO Titel
            type: text
            placeholder: "{{ page.title }}"
            help: Titel für Suchmaschinen (falls abweichend)
            width: 1/2
            
          seo_description:
            label: SEO Beschreibung
            type: textarea
            maxlength: 160
            help: Kurze Beschreibung für Suchmaschinen
            width: 1/2
            
          # Social sharing image
          social_image:
            label: Social Media Bild
            type: files
            max: 1
            help: Bild für Social Media Sharing (falls abweichend vom Titelbild)
            layout: list
            
          # Visibility settings
          featured:
            label: Hervorheben
            type: toggle
            text: Diesen Eintrag in Listen hervorheben
            help: Featured Einträge werden prominenter dargestellt
            
          # Comments or feedback
          internal_notes:
            label: Interne Notizen
            type: textarea
            help: Interne Notizen oder Kommentare (nicht öffentlich sichtbar)
