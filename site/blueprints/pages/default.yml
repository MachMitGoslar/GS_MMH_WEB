title: Standard Seite
icon: 📝

options:
  changeTemplate:
    - about

tabs:
  content:
    label: Inhalt
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          fields:
            type: fields
            fields:
              cover: fields/cover
              headline:
                label: Titel
                type: text
              subheadline:
                label: Subtitel
                type: text
              text:
                type: writer
                label: Text
                toolbar:
                  inline: true
                  marks:
                    - bold
                    - button
              layout:
                type: layout
                size: huge
                label: Inhalt
                layouts:
                  - "1/1"
                  - "1/2, 1/2"
                  - "1/4, 1/4, 1/4, 1/4"
                  - "1/3, 2/3"
                  - "2/3, 1/3"
                  - "1/3, 1/3, 1/3"
                fieldsets:
                  - heading
                  - text
                  - image
                  - list
                  - card
                  - button
                  - timeline
                  - form
                  - gallery
                  - download
                  - table
                settings:
                  fields:
                    publish_date:
                      label: Veröffentlichungsdatum
                      type: date
                      time: true
                      width: 1/2
                    end_date:
                      label: Enddatum
                      type: date
                      time: true
                      width: 1/2

      sidebar:
        width: 1/3
        sections:
          pages:
            type: pages
            template: default
          files:
            type: files
            uploads: false

  schedule:
    label: Veröffentlichung
    icon: clock
    columns:
      main:
        sections:
          scheduling:
            type: fields
            fields:
              publish_date:
                label: Veröffentlichungsdatum
                type: date
                time: true
                default: now
              end_date:
                label: Enddatum
                type: date
                time: true
