title: Projekte
icon: 🖼

tabs:
  content:
    label: Inhalt
    columns:
      - width: 2/3
        fields:
          cover: fields/cover

          headline:
            type: text
            placeholder: page.title
            required: true

          subheadline:
            label: Untertitel
            type: text

      - width: 1/3
        sections:
          projects:
            type: pages
            label: Projekte
            query: page.children.filterBy("project_status", "!=", "abgeschlossen")
            status: all
            template: project
            create: true
            sortable: true

  settings:
    label: Einstellungen
    icon: cog
    fields:
      display_settings:
        label: Anzeigeoptionen
        type: headline

      show_active:
        label: Aktive Projekte (Hauptseite)
        help: Anzeige auf der MachMit!Projekte-Seite.
        type: toggle
        text:
          - "Nein"
          - "Ja"
        default: true

      show_archive:
        label: Archivierte Projekte (Hauptseite)
        help: Anzeige des Archivbereichs auf der MachMit!Projekte-Seite.
        type: toggle
        text:
          - "Nein"
          - "Ja"
        default: false

      show_search:
        label: Suchfeld im Archiv
        help: Anzeige des Suchfelds auf der Archivseite.
        type: toggle
        text:
          - "Nein"
          - "Ja"
        default: false

  archive:
    label: Projektarchiv
    icon: archive
    columns:
      - width: 1/1
        sections:
          archive_projects:
            extends: sections/projects
            label: Archivierte Projekte
            query: site.find("project-archive").children.merge(site.find("projects").children).filterBy("project_status", "abgeschlossen")
            status: all
            template: project
            create: true
            sortable: true
